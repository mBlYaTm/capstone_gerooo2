version: '3.8'

services:

  # ── Redis — Zero-Persistence (no disk save) ──────────────────────────────
  redis:
    image: redis:alpine
    container_name: zero-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── FastAPI Server ────────────────────────────────────────────────────────
  api:
    build: .
    container_name: zero-api
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  # ── Grafana Dashboard ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana
    container_name: zero-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
